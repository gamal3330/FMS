services:
  backend:
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost,https://127.0.0.1,http://localhost,http://127.0.0.1}

  frontend:
    ports:
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - ./frontend/nginx.https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
