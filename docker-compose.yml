services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qib_it_portal
      POSTGRES_USER: qib
      POSTGRES_PASSWORD: qib
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qib -d qib_it_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://qib:qib@postgres:5432/qib_it_portal
      SECRET_KEY: change-this-in-production
      CORS_ORIGINS: http://172.16.23.37:5173,http://172.16.23.37
      SEED_ADMIN_EMAIL: admin@qib.internal-bank.qa
      SEED_ADMIN_PASSWORD: Admin@12345
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://172.16.23.37:8000/api/v1
    environment:
      VITE_API_BASE_URL: http://172.16.23.37:8000/api/v1
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  backend_uploads:
