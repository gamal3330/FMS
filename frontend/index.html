<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Language" content="ar" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" />
    <link rel="apple-touch-icon" />
    <title>نظام إدارة النماذج</title>
    <script>
      (function () {
        var fallback = "#0d6337";
        var color = localStorage.getItem("qib_brand_color") || fallback;
        if (!/^#[0-9A-Fa-f]{6}$/.test(color)) color = fallback;

        function mix(first, second, amount) {
          var a = first.replace("#", "");
          var b = second.replace("#", "");
          return (
            "#" +
            [0, 2, 4]
              .map(function (index) {
                var firstValue = parseInt(a.slice(index, index + 2), 16);
                var secondValue = parseInt(b.slice(index, index + 2), 16);
                return Math.round(firstValue * (1 - amount) + secondValue * amount)
                  .toString(16)
                  .padStart(2, "0");
              })
              .join("")
          );
        }

        function rgb(hex) {
          var value = hex.replace("#", "");
          return [
            parseInt(value.slice(0, 2), 16),
            parseInt(value.slice(2, 4), 16),
            parseInt(value.slice(4, 6), 16)
          ].join(" ");
        }

        var root = document.documentElement;
        var storedTheme = localStorage.getItem("qib_theme");
        var theme = storedTheme || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        root.setAttribute("data-theme", theme === "dark" ? "dark" : "light");
        root.style.setProperty("--bank-50", rgb(mix(color, "#ffffff", 0.93)));
        root.style.setProperty("--bank-100", rgb(mix(color, "#ffffff", 0.82)));
        root.style.setProperty("--bank-600", rgb(mix(color, "#ffffff", 0.08)));
        root.style.setProperty("--bank-700", rgb(color));
        root.style.setProperty("--bank-900", rgb(mix(color, "#000000", 0.45)));
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
